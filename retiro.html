<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Retirar Fondos | Stuntfly</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">

    <style>
        :root {
            --bg-black: #000000;
            --apple-dark: #1c1c1e;
            --apple-gray: #2c2c2e;
            --accent-blue: #0A84FF;
            --apple-red: #FF453A;
            --apple-green: #32D74B;
            --text-secondary: #8E8E93;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-black);
            color: white;
            margin: 0;
            padding: 20px;
            overflow-x: hidden;
        }

        /* --- HEADER --- */
        .nav-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 30px;
        }
        .back-btn {
            color: var(--accent-blue);
            text-decoration: none;
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        /* --- BALANCE CARD --- */
        .balance-info {
            text-align: center;
            margin-bottom: 40px;
        }
        .balance-label { color: var(--text-secondary); font-size: 0.8rem; font-weight: 600; text-transform: uppercase; }
        .balance-amount { font-size: 2.5rem; font-weight: 800; letter-spacing: -1px; }

        /* --- FORMULARIO ESTILO SETTINGS --- */
        .ios-group {
            background: var(--apple-dark);
            border-radius: 15px;
            overflow: hidden;
            margin-bottom: 25px;
        }
        .ios-item {
            display: flex;
            align-items: center;
            padding: 12px 16px;
            border-bottom: 0.5px solid var(--apple-gray);
        }
        .ios-item:last-child { border-bottom: none; }
        .ios-item label { width: 100px; color: var(--text-secondary); font-size: 0.9rem; margin: 0; }
        
        .ios-input {
            flex: 1;
            background: transparent;
            border: none;
            color: white;
            font-size: 1rem;
            outline: none;
            text-align: right;
        }
        .ios-input::placeholder { color: #48484a; }

        /* --- INFO BOX --- */
        .info-card {
            background: rgba(10, 132, 255, 0.1);
            border-radius: 12px;
            padding: 15px;
            display: flex;
            gap: 12px;
            margin-bottom: 30px;
        }
        .info-card i { color: var(--accent-blue); font-size: 1.2rem; }
        .info-card p { font-size: 0.85rem; color: #d1d1d6; margin: 0; line-height: 1.4; }

        /* --- BUTTON --- */
        #withdrawAction {
            background: white;
            color: black;
            border: none;
            border-radius: 18px;
            padding: 18px;
            font-weight: 800;
            width: 100%;
            font-size: 1rem;
            transition: 0.3s;
        }
        #withdrawAction:active { transform: scale(0.97); opacity: 0.8; }
        #withdrawAction:disabled { background: var(--apple-gray); color: var(--text-secondary); }

        /* --- STATUS OVERLAY --- */
        #status-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); z-index: 2000;
            display: none; align-items: center; justify-content: center; text-align: center;
        }
    </style>
</head>
<body>

    <div class="nav-header">
        <a href="index.html" class="back-btn"><i class="bi bi-chevron-left"></i> Billetera</a>
        <span class="fw-bold">Retirar</span>
        <div style="width: 40px;"></div> </div>

    <div class="balance-info">
        <div class="balance-label">Disponible para retirar</div>
        <div class="balance-amount">$<span id="display-bal">0.00</span></div>
    </div>

    <div class="ios-group">
        <div class="ios-item">
            <label>Monto</label>
            <input type="number" id="monto" class="ios-input" placeholder="0.00" inputmode="decimal">
        </div>
        <div class="ios-item">
            <label>CBU/CVU</label>
            <input type="text" id="cbu" class="ios-input" placeholder="22 dígitos o Alias">
        </div>
        <div class="ios-item">
            <label>DNI</label>
            <input type="number" id="dni" class="ios-input" placeholder="Solo números">
        </div>
    </div>

    <div class="info-card">
        <i class="bi bi-info-circle-fill"></i>
        <p><b>Verificación de Identidad:</b> Por seguridad, la cuenta de destino debe pertenecer al titular del DNI ingresado. Los retiros se procesan de forma inmediata tras la validación.</p>
    </div>

    <button id="withdrawAction" onclick="processWithdraw()">SOLICITAR RETIRO</button>

    <div id="status-overlay">
        <div class="p-4">
            <div id="status-icon" style="font-size: 4rem; margin-bottom: 20px;"></div>
            <h3 id="status-title" class="fw-bold"></h3>
            <p id="status-desc" class="text-secondary"></p>
            <button class="btn btn-link text-decoration-none mt-4" onclick="location.href='index.html'" style="color: var(--accent-blue);">Volver al inicio</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue, get, runTransaction } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD40SqIpz4EFvTlHlbs4Amm9H4I2NKqgDE",
            authDomain: "login-c4685.firebaseapp.com",
            projectId: "login-c4685",
            databaseURL: "https://login-c4685-default-rtdb.firebaseio.com/"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const auth = getAuth(app);

        const TELEGRAM_BOT_TOKEN = "8651922790:AAFxP1Am31RzNVPvs98wUQ_wISiobi3IXU8";
        const TELEGRAM_CHAT_ID = "6493944778";

        let userBalance = 0;

        onAuthStateChanged(auth, (user) => {
            if (!user) {
                location.href = 'index.html';
                return;
            }

            onValue(ref(db, `usuarios/${user.uid}/balance`), (snap) => {
                userBalance = parseFloat(snap.val() || 0);
                document.getElementById('display-bal').innerText = userBalance.toFixed(2);
            });
        });

        window.processWithdraw = async () => {
            const monto = parseFloat(document.getElementById('monto').value);
            const cbu = document.getElementById('cbu').value.trim();
            const dni = document.getElementById('dni').value.trim();
            const btn = document.getElementById('withdrawAction');
            const user = auth.currentUser;

            // Validaciones
            if (!monto || monto <= 0 || !cbu || !dni) {
                showStatus('error', 'Datos incompletos', 'Por favor, completa todos los campos correctamente.');
                return;
            }

            if (monto > userBalance) {
                showStatus('error', 'Saldo insuficiente', 'No tienes suficiente dinero para este retiro.');
                return;
            }

            btn.disabled = true;
            btn.innerText = "PROCESANDO...";

            try {
                const userRef = ref(db, `usuarios/${user.uid}`);
                const transaction = await runTransaction(userRef, (userData) => {
                    if (userData) {
                        let current = parseFloat(userData.balance || 0);
                        if (current >= monto) {
                            userData.balance = current - monto;
                        } else {
                            return; // Abortar si el saldo cambió
                        }
                    }
                    return userData;
                });

                if (transaction.committed) {
                    // Enviar a Telegram
                    const mensaje = `🔔 *NUEVA SOLICITUD DE RETIRO*%0A%0A` +
                                    `👤 *Usuario:* ${user.email.split('@')[0]}%0A` +
                                    `💰 *Monto:* $${monto.toFixed(2)}%0A` +
                                    `🏦 *CBU/CVU:* ${cbu}%0A` +
                                    `🆔 *DNI:* ${dni}%0A` +
                                    `📅 *Fecha:* ${new Date().toLocaleString('es-AR')}`;

                    await fetch(`https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage?chat_id=${TELEGRAM_CHAT_ID}&text=${mensaje}&parse_mode=Markdown`);

                    showStatus('success', 'Solicitud enviada', 'Tu retiro está siendo procesado. Recibirás el dinero en tu cuenta en breve.');
                }
            } catch (e) {
                showStatus('error', 'Error de red', 'Hubo un problema. Intenta nuevamente.');
                btn.disabled = false;
                btn.innerText = "SOLICITAR RETIRO";
            }
        };

        function showStatus(type, title, desc) {
            const overlay = document.getElementById('status-overlay');
            const icon = document.getElementById('status-icon');
            const t = document.getElementById('status-title');
            const d = document.getElementById('status-desc');

            overlay.style.display = 'flex';
            t.innerText = title;
            d.innerText = desc;

            if (type === 'success') {
                icon.innerHTML = '<i class="bi bi-check-circle-fill" style="color: var(--apple-green);"></i>';
            } else {
                icon.innerHTML = '<i class="bi bi-exclamation-circle-fill" style="color: var(--apple-red);"></i>';
            }
        }
    </script>
</body>
</html>
